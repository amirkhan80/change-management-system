<!DOCTYPE html>
<html>
<head>
<title>Login - Change Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.glass-card{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:40px;
    color:white;
    width:380px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.form-control{
    border-radius:10px;
}

.btn-custom{
    border-radius:25px;
    transition:0.3s;
}

.btn-custom:hover{
    transform:scale(1.05);
}

a{
    color:white;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="glass-card text-center">
<h3 class="mb-4">
<i class="fa-solid fa-right-to-bracket"></i> Login
</h3>

<form method="POST">

<input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

<div class="input-group mb-3">
<input type="password" name="password" id="loginPassword" class="form-control" placeholder="Password" required>
<button type="button" class="btn btn-light" onclick="toggleLoginPassword()">
<i class="fa-solid fa-eye"></i>
</button>
</div>

<button class="btn btn-light w-100 btn-custom">
<i class="fa-solid fa-arrow-right"></i> Login
</button>

</form>

<p class="mt-4">
New user? <a href="/register"><b>Register here</b></a>
</p>

</div>

<script>
function toggleLoginPassword() {
  var x = document.getElementById("loginPassword");
  if (x.type === "password") {
    x.type = "text";
  } else {
    x.type = "password";
  }
}
</script>

</body>
</html>
